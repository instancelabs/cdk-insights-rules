name: Rule review

# AI-assisted review of rule contributions, running Claude on Amazon Bedrock.
#
# No API key: the job obtains short-lived AWS credentials via OIDC (the same
# pattern as npm trusted publishing) by assuming a minimally-scoped role that
# can only call bedrock:InvokeModel on the review model.
#
# SAFETY: this uses `pull_request_target`, so it can read repo secrets even on
# fork PRs. It never runs the PR's code — it checks out the trusted BASE commit,
# installs from the base lockfile, fetches the PR diff as text via the API, and
# sends only that text to Bedrock. The AWS role is scoped to a single model, so
# blast radius is minimal.
#
# GATE: the review runs only when a maintainer applies the `ai-review` label,
# so drive-by PRs can't invoke Bedrock (spend) and the model only ever reads
# diffs a human decided were worth reviewing. Remove and re-apply the label to
# re-run after the PR changes.
#
# PROMPT INJECTION: the diff is attacker-controlled text, so the model's
# verdict can be steered and is advisory ONLY. scripts/ai-review.mjs validates
# the model's JSON against strict enums and escapes all free text before it is
# rendered into the comment (no links, mentions, or markdown structure), and
# asks the model to flag suspected injection attempts.
#
# One-time setup (see README):
#   - secret AWS_REVIEW_ROLE_ARN — an IAM role trusting this repo's OIDC with
#     bedrock:InvokeModel on the review model.
#   - variable BEDROCK_MODEL_ID — the Bedrock model / inference-profile id.
#   - a `ai-review` label in the repo.

on:
  pull_request_target:
    types: [labeled]

permissions:
  contents: read
  pull-requests: write
  id-token: write # AWS OIDC

concurrency:
  group: ai-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  ai-review:
    if: github.event.label.name == 'ai-review'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the trusted base (never the PR head)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Installs from the trusted base lockfile (includes the Bedrock SDK).
      - run: npm ci

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_REVIEW_ROLE_ARN }}
          aws-region: us-east-1

      - name: Fetch the PR diff (data only)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr diff ${{ github.event.pull_request.number }} --repo ${{ github.repository }} > rule.diff

      - name: AI review
        env:
          AWS_REGION: us-east-1
          BEDROCK_MODEL_ID: ${{ vars.BEDROCK_MODEL_ID }}
        run: node scripts/ai-review.mjs rule.diff | tee review.md

      - name: Post review comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --edit-last --body-file review.md \
            || gh pr comment ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --body-file review.md
