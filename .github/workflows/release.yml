name: Release

# Publishes to npm when a version tag (v*) is pushed. Requires an NPM_TOKEN
# repository secret with publish rights to `cdk-insights-rules`.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write # npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: npm ci

      # Same gates as CI — never publish something that wouldn't pass a PR.
      - run: npm run ci
      - run: npm run build

      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
