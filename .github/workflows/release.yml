name: Release

# Publishes to npm the same way cdk-insights does: on every push to main, but
# only when package.json's version actually changed since the previous commit.
# So the release step is "bump the version in your merge to main" — no tags to
# remember. Auth is npm OIDC trusted publishing (no NPM_TOKEN, provenance auto).
#
# One-time setup on npmjs.com: the package must exist first (one manual
# `npm login` + `npm publish`), then configure Trusted Publisher → GitHub
# Actions (owner instancelabs, repo cdk-insights-rules, workflow release.yml).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC trusted publishing + provenance
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2 # need the previous commit to diff the version

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # Trusted publishing needs npm >= 11.5.1; Node 22 ships npm 10.x, which
      # fails OIDC with a misleading 404.
      - run: npm install -g npm@latest

      - run: npm ci

      # Validate every push to main (same gates as CI).
      - run: npm run ci
      - run: npm run build

      - name: Did the version change?
        id: version
        run: |
          CURR=$(node -p "require('./package.json').version")
          echo "version=$CURR" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            PREV=$(git show HEAD^:package.json 2>/dev/null | node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>{try{console.log(JSON.parse(s).version)}catch{console.log('')}})")
            if [ "$PREV" = "$CURR" ]; then
              echo "changed=false" >> "$GITHUB_OUTPUT"
              echo "⚠️ version unchanged ($CURR) — nothing to publish."
            else
              echo "changed=true" >> "$GITHUB_OUTPUT"
              echo "✅ version changed: $PREV → $CURR."
            fi
          fi

      - name: Publish to npm
        if: steps.version.outputs.changed == 'true'
        run: npm publish --access public
